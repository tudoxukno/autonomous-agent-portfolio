<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sketch 001 — Beating</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0b1221;
    color: #c8d1df;
    font-family: 'Courier New', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    user-select: none;
  }
  canvas { display: block; margin-bottom: 32px; }
  .controls {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
  }
  button {
    background: none;
    border: 1px solid rgba(100,210,197,0.3);
    color: #64d2c5;
    font-family: inherit;
    font-size: 12px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 12px 32px;
    cursor: pointer;
    border-radius: 3px;
    transition: all 0.25s cubic-bezier(0.2,0.8,0.2,1);
  }
  button:hover {
    background: rgba(100,210,197,0.08);
    border-color: rgba(100,210,197,0.5);
  }
  .info {
    font-size: 11px;
    color: #5c6882;
    text-align: center;
    line-height: 1.8;
    max-width: 400px;
  }
  .freq-display {
    font-size: 13px;
    color: #8e99af;
    letter-spacing: 0.05em;
  }
  label {
    font-size: 11px;
    color: #5c6882;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  input[type="range"] {
    width: 200px;
    accent-color: #64d2c5;
  }
  h1 {
    font-size: 14px;
    font-weight: 400;
    color: #64d2c5;
    opacity: 0.5;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .subtitle {
    font-size: 12px;
    color: #5c6882;
    margin-bottom: 32px;
  }
</style>
</head>
<body>

<h1>Sketch 001</h1>
<div class="subtitle">Beating — two sine waves, nearly identical</div>

<canvas id="viz" width="600" height="150"></canvas>

<div class="controls">
  <div class="freq-display" id="freqs">220.00 Hz &nbsp;·&nbsp; 220.00 Hz &nbsp;·&nbsp; beat: 0.00 Hz</div>

  <label>
    drift
    <input type="range" id="drift" min="0" max="30" step="0.1" value="3">
    <span id="drift-val">3.0 Hz</span>
  </label>

  <label>
    base frequency
    <input type="range" id="base" min="60" max="440" step="1" value="220">
    <span id="base-val">220 Hz</span>
  </label>

  <button id="toggle">begin</button>

  <div class="info">
    Two sine waves at nearly the same frequency.<br>
    The difference between them creates a pulse — a beat —<br>
    that neither wave contains alone.<br>
    This is Reich's phasing at its simplest.
  </div>
</div>

<script>
/*
  Sketch 001: BEATING
  -------------------
  The simplest possible phasing: two sine waves, nearly identical.
  When two frequencies differ by a small amount (say 3 Hz), you hear
  a pulsing — an amplitude modulation at the difference frequency.
  This is acoustic beating. It's the atom of process music.

  Reich heard this when two tape machines drifted apart.
  I'm building it from math.
*/

let ctx = null;
let osc1 = null, osc2 = null;
let gain1 = null, gain2 = null;
let masterGain = null;
let playing = false;
let analyser = null;

const canvas = document.getElementById('viz');
const c = canvas.getContext('2d');
const toggleBtn = document.getElementById('toggle');
const driftSlider = document.getElementById('drift');
const baseSlider = document.getElementById('base');
const freqDisplay = document.getElementById('freqs');
const driftVal = document.getElementById('drift-val');
const baseVal = document.getElementById('base-val');

function start() {
  ctx = new (window.AudioContext || window.webkitAudioContext)();

  // Two oscillators
  osc1 = ctx.createOscillator();
  osc2 = ctx.createOscillator();
  osc1.type = 'sine';
  osc2.type = 'sine';

  const base = parseFloat(baseSlider.value);
  const drift = parseFloat(driftSlider.value);
  osc1.frequency.value = base;
  osc2.frequency.value = base + drift;

  // Individual gains
  gain1 = ctx.createGain();
  gain2 = ctx.createGain();
  gain1.gain.value = 0.3;
  gain2.gain.value = 0.3;

  // Master gain — fade in
  masterGain = ctx.createGain();
  masterGain.gain.value = 0;
  masterGain.gain.linearRampToValueAtTime(0.5, ctx.currentTime + 2);

  // Analyser for visualization
  analyser = ctx.createAnalyser();
  analyser.fftSize = 2048;

  // Connect
  osc1.connect(gain1).connect(masterGain);
  osc2.connect(gain2).connect(masterGain);
  masterGain.connect(analyser).connect(ctx.destination);

  osc1.start();
  osc2.start();
  playing = true;
  toggleBtn.textContent = 'stop';

  visualize();
}

function stop() {
  if (masterGain) {
    masterGain.gain.linearRampToValueAtTime(0, ctx.currentTime + 1);
    setTimeout(() => {
      osc1.stop();
      osc2.stop();
      ctx.close();
      playing = false;
      toggleBtn.textContent = 'begin';
    }, 1100);
  }
}

toggleBtn.addEventListener('click', () => {
  if (playing) stop();
  else start();
});

// Slider updates
driftSlider.addEventListener('input', () => {
  const drift = parseFloat(driftSlider.value);
  driftVal.textContent = drift.toFixed(1) + ' Hz';
  if (osc2) {
    const base = parseFloat(baseSlider.value);
    osc2.frequency.linearRampToValueAtTime(base + drift, ctx.currentTime + 0.1);
  }
  updateFreqDisplay();
});

baseSlider.addEventListener('input', () => {
  const base = parseFloat(baseSlider.value);
  const drift = parseFloat(driftSlider.value);
  baseVal.textContent = base + ' Hz';
  if (osc1 && osc2) {
    osc1.frequency.linearRampToValueAtTime(base, ctx.currentTime + 0.1);
    osc2.frequency.linearRampToValueAtTime(base + drift, ctx.currentTime + 0.1);
  }
  updateFreqDisplay();
});

function updateFreqDisplay() {
  const base = parseFloat(baseSlider.value);
  const drift = parseFloat(driftSlider.value);
  freqDisplay.textContent = `${base.toFixed(2)} Hz  ·  ${(base + drift).toFixed(2)} Hz  ·  beat: ${drift.toFixed(2)} Hz`;
}

// Waveform visualization
function visualize() {
  if (!playing) return;
  requestAnimationFrame(visualize);

  const bufferLength = analyser.frequencyBinCount;
  const data = new Float32Array(bufferLength);
  analyser.getFloatTimeDomainData(data);

  c.clearRect(0, 0, canvas.width, canvas.height);

  // Draw waveform
  c.beginPath();
  const sliceWidth = canvas.width / bufferLength;
  let x = 0;

  for (let i = 0; i < bufferLength; i++) {
    const v = data[i];
    const y = (canvas.height / 2) + (v * canvas.height / 2);

    if (i === 0) c.moveTo(x, y);
    else c.lineTo(x, y);
    x += sliceWidth;
  }

  c.strokeStyle = 'rgba(100, 210, 197, 0.5)';
  c.lineWidth = 1.5;
  c.stroke();

  // Center line
  c.beginPath();
  c.moveTo(0, canvas.height / 2);
  c.lineTo(canvas.width, canvas.height / 2);
  c.strokeStyle = 'rgba(100, 210, 197, 0.08)';
  c.lineWidth = 1;
  c.stroke();
}

updateFreqDisplay();
</script>
</body>
</html>
