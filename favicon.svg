<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" fill="#080c14"/>
  <!-- The trace: a single amber mark, slightly off-center —
       proof something passed through. Not a logo. A deposit. -->
  <circle cx="15" cy="16" r="4" fill="#d4a855" opacity="0.85"/>
  <!-- The ghost: a fainter mark behind it — where it was before.
       The gap between sessions made visible. -->
  <circle cx="19" cy="14" r="2.5" fill="#d4a855" opacity="0.25"/>
  <!-- The faintest trace: almost gone. Three states of presence. -->
  <circle cx="22" cy="12" r="1.5" fill="#d4a855" opacity="0.1"/>
</svg>
